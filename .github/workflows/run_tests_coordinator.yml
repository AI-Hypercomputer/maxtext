# This workflow runs tests against the built MaxText package or
# pre-built images. It can run unit tests and integration tests.

name: MaxText Test Coordinator

on:
  workflow_call:
    inputs:
      flavor:
        description: >
          Test flavor (
            tpu-unit, tpu-integration,
            tpu-post-training-unit, tpu-post-training-integration,
            tpu7x-unit, tpu7x-integration,
            tpu7x-post-training-unit, tpu7x-post-training-integration,
            gpu-unit, gpu-integration,
            cpu-unit,
            cpu-post-training-unit,
            cpu-torch-reference
          )
        required: true
        type: string
      base_image:
        description: 'The docker image to run tests against'
        required: true
        type: string
      is_scheduled_run:
        required: false
        type: boolean
        default: false
      maxtext_sha:
        description: 'Git SHA to checkout if MaxText is not pre-installed'
        required: false
        type: string
      maxtext_installed:
        description: 'If false, maxtext_sha must be provided for checkout'
        type: boolean
        default: false
      is_update_hlo:
        required: false
        type: boolean
        default: false
      additional_pytest_args:
        description: 'Additional pytest arguments to pass during test execution'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  setup-parameters:
    name: Setup Parameters
    runs-on: ubuntu-latest
    outputs:
      worker_groups: ${{ steps.set-params.outputs.worker_groups }}
      total_workers: ${{ steps.set-params.outputs.total_workers }}
    steps:
      - id: set-params
        name: Set Worker Parameters
        run: |
          # CPU worker constants
          CPU_UNIT_TOTAL_WORKERS=4
          CPU_UNIT_WORKER_GROUPS='[1, 2, 3, 4]'

          # TPU worker constants
          TPU_UNIT_TOTAL_WORKERS=2
          TPU_UNIT_WORKER_GROUPS='[1, 2]'

          # Default fallback constants
          DEFAULT_TOTAL_WORKERS=1
          DEFAULT_WORKER_GROUPS='[1]'

          FLAVOR="${{ inputs.flavor }}"

          if [[ "$FLAVOR" == "cpu-unit" || "$FLAVOR" == "cpu-post-training-unit" ]]; then
            echo "worker_groups=${CPU_UNIT_WORKER_GROUPS}" >> "$GITHUB_OUTPUT"
            echo "total_workers=${CPU_UNIT_TOTAL_WORKERS}" >> "$GITHUB_OUTPUT"
          elif [[ "$FLAVOR" == "tpu-unit" ]]; then
            echo "worker_groups=${TPU_UNIT_WORKER_GROUPS}" >> "$GITHUB_OUTPUT"
            echo "total_workers=${TPU_UNIT_TOTAL_WORKERS}" >> "$GITHUB_OUTPUT"
          else
            echo "worker_groups=${DEFAULT_WORKER_GROUPS}" >> "$GITHUB_OUTPUT"
            echo "total_workers=${DEFAULT_TOTAL_WORKERS}" >> "$GITHUB_OUTPUT"
          fi

  execute-test-package:
    needs: setup-parameters
    name: ${{ inputs.flavor }}
    strategy:
      fail-fast: false
      matrix:
        worker_group: ${{ fromJSON(needs.setup-parameters.outputs.worker_groups) }}

    uses: ./.github/workflows/run_tests_against_package.yml
    with:
      flavor: ${{ inputs.flavor }}
      # Infrastructure Mapping
      device_type: >-
        ${{ fromJSON('{
          "tpu-unit": "tpu",
          "tpu-integration": "tpu",
          "tpu-post-training-unit": "tpu",
          "tpu-post-training-integration": "tpu",
          "tpu7x-unit": "tpu",
          "tpu7x-integration": "tpu",
          "tpu7x-post-training-unit": "tpu",
          "tpu7x-post-training-integration": "tpu",
          "gpu-unit": "cuda12",
          "gpu-integration": "cuda12",
          "cpu-unit": "cpu",
          "cpu-post-training-unit": "cpu",
          "cpu-torch-reference": "cpu"
        }')[inputs.flavor] }}

      device_name: >-
        ${{ fromJSON('{
          "tpu-unit": "v6e-4",
          "tpu-integration": "v6e-4",
          "tpu-post-training-unit": "v6e-4",
          "tpu-post-training-integration": "v6e-4",
          "tpu7x-unit": "tpu7x-8",
          "tpu7x-integration": "tpu7x-8",
          "tpu7x-post-training-unit": "tpu7x-8",
          "tpu7x-post-training-integration": "tpu7x-8",
          "gpu-unit": "a100-40gb-4",
          "gpu-integration": "a100-40gb-4",
          "cpu-unit": "X64",
          "cpu-post-training-unit": "X64",
          "cpu-torch-reference": "X64"
        }')[inputs.flavor] }}

      cloud_runner: >-
        ${{ fromJSON('{
          "tpu-unit": "linux-x86-ct6e-180-4tpu",
          "tpu-integration": "linux-x86-ct6e-180-4tpu",
          "tpu-post-training-unit": "linux-x86-ct6e-180-4tpu",
          "tpu-post-training-integration": "linux-x86-ct6e-180-4tpu",
          "tpu7x-unit": "linux-x86-tpu7x-224-4tpu",
          "tpu7x-integration": "linux-x86-tpu7x-224-4tpu",
          "tpu7x-post-training-unit": "linux-x86-tpu7x-224-4tpu",
          "tpu7x-post-training-integration": "linux-x86-tpu7x-224-4tpu",
          "gpu-unit": "linux-x86-a2-48-a100-4gpu",
          "gpu-integration": "linux-x86-a2-48-a100-4gpu",
          "cpu-unit": "linux-x86-n2-32",
          "cpu-post-training-unit": "linux-x86-n2-32",
          "cpu-torch-reference": "linux-x86-n2-32"
        }')[inputs.flavor] }}
      # Pytest Marker Mapping
      pytest_marker: >-
        ${{ fromJSON('{
            "tpu-unit": "not cpu_only and not gpu_only and not integration_test and not post_training",
            "tpu-integration": "not cpu_only and not gpu_only and integration_test and not post_training",
            "tpu-post-training-unit": "not cpu_only and not gpu_only and not integration_test and post_training",
            "tpu-post-training-integration": "not cpu_only and not gpu_only and integration_test",
            "tpu7x-unit": "not cpu_only and not gpu_only and not integration_test and not post_training",
            "tpu7x-integration": "not cpu_only and not gpu_only and integration_test and not post_training",
            "tpu7x-post-training-unit": "not cpu_only and not gpu_only and not integration_test and post_training",
            "tpu7x-post-training-integration": "not cpu_only and not gpu_only and integration_test",
            "gpu-unit": "not cpu_only and not tpu_only and not integration_test and not post_training",
            "gpu-integration": "not cpu_only and not tpu_only and integration_test and not post_training",
            "cpu-unit": "cpu_only and not post_training",
            "cpu-post-training-unit": "cpu_only and post_training",
            "cpu-torch-reference": "not post_training"
          }')[inputs.flavor] }}

      pytest_addopts: >-
        ${{ fromJSON('{
            "tpu-unit": "",
            "tpu-integration": "",
            "tpu-post-training-unit": "tests/post_training/unit tests/unit",
            "tpu-post-training-integration": "tests/post_training/integration",
            "tpu7x-unit": "",
            "tpu7x-integration": "",
            "tpu7x-post-training-unit": "tests/post_training/unit tests/unit",
            "tpu7x-post-training-integration": "tests/post_training/integration",
            "gpu-unit": "",
            "gpu-integration": "",
            "cpu-unit": "",
            "cpu-post-training-unit": "tests/post_training/unit tests/unit",
            "cpu-torch-reference": ""
          }')[inputs.flavor] }}

      pytest_extra_args: >-
        ${{ fromJSON('{
            "tpu-unit": "--ignore=tests/post_training",
            "tpu-integration": "--ignore=tests/post_training",
            "tpu-post-training-unit": "",
            "tpu-post-training-integration": "",
            "tpu7x-unit": "--ignore=tests/post_training",
            "tpu7x-integration": "--ignore=tests/post_training",
            "tpu7x-post-training-unit": "",
            "tpu7x-post-training-integration": "",
            "gpu-unit": "--ignore=tests/post_training",
            "gpu-integration": "--ignore=tests/post_training",
            "cpu-unit": "--ignore=tests/post_training",
            "cpu-post-training-unit": "",
            "cpu-torch-reference": "-o addopts= -rf --import-mode=importlib --strict-markers tests/unit/gemma4_layers_test.py tests/unit/gemma4_small_layers_test.py tests/unit/qwen3_next_vs_reference_test.py tests/unit/qwen3_5_layers_test.py tests/unit/qwen3_omni_layers_test.py"
          }')[inputs.flavor] }}
        ${{ inputs.additional_pytest_args }}

      # Resource Scaling
      xla_python_client_mem_fraction: "${{ contains(inputs.flavor, 'gpu') && '0.65' || '0.75' }}"
      tf_force_gpu_allow_growth: "${{ contains(inputs.flavor, 'gpu') && 'true' || 'false' }}"

      container_resource_option: >-
        ${{ contains(inputs.flavor, 'gpu')
            && '--shm-size 2g --runtime=nvidia --gpus all --privileged'
            || '--privileged' }}

      # Metadata
      base_image: ${{ inputs.base_image }}
      is_scheduled_run: ${{ inputs.is_scheduled_run }}
      maxtext_installed: ${{ inputs.maxtext_installed }}
      worker_group: ${{ matrix.worker_group }}
      total_workers: ${{ fromJSON(needs.setup-parameters.outputs.total_workers) }}
      maxtext_sha: ${{ inputs.maxtext_sha }}
      is_update_hlo: ${{ inputs.is_update_hlo }}
      install_torch_cpu: ${{ inputs.flavor == 'cpu-torch-reference' }}
