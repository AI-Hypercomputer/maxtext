# This file defines a module for running tests used in UnitTests.yml

name: Run Tests

on:
  workflow_call:
    inputs:
      device_type:
        required: true
        type: string
      device_name:
        required: true
        type: string
      pytest_marker:
        required: true
        type: string
      test_directory:
        required: true
        type: string
      xla_python_client_mem_fraction:
        required: true
        type: string
      tf_force_gpu_allow_growth:
        required: true
        type: string
      container_resource_option:
        required: true
        type: string

jobs:
  run:
    runs-on: ["self-hosted", "${{ inputs.device_type }}", "${{ inputs.device_name }}"]
    steps:
      - uses: actions/checkout@v4
      - name: Run containers
        run: |
          bash docker_build_pathways_containers.sh
