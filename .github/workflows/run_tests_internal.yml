# This file defines a module for running tests used in UnitTests.yml

name: Run Tests

on:
  workflow_call:
    inputs:
      device_type:
        required: true
        type: string
      device_name:
        required: true
        type: string
      pytest_marker:
        required: true
        type: string
      xla_python_client_mem_fraction:
        required: true
        type: string
      tf_force_gpu_allow_growth:
        required: true
        type: string
      container_resource_option:
        required: true
        type: string

jobs:
  tests:
    runs-on: ["self-hosted", "${{ inputs.device_type }}", "${{ inputs.device_name }}"]
    container:
      image: gcr.io/tpu-prod-env-multipod/maxtext_${{ github.run_id }}:${{ inputs.device_type }}
      volumes:
        - /home/runner/actions-runner/_work/maxtext/maxtext:/deps
      env:
        XLA_PYTHON_CLIENT_MEM_FRACTION: ${{ inputs.xla_python_client_mem_fraction }}
        TF_FORCE_GPU_ALLOW_GROWTH: ${{ inputs.tf_force_gpu_allow_growth }}
      options: ${{ inputs.container_resource_option }}
    strategy:
      fail-fast: false
      matrix:
        test_category:
          - name: unit
            marker: 'not integration_test'
            directory: 'tests'
          - name: integration
            marker: 'integration_test'
            directory: 'tests/integration_tests'
    steps:
      - uses: actions/checkout@v4
      - name: Run ${{ matrix.test_category.name }} tests
        run: |
          cd MaxText
          python3 -m pytest ${{ matrix.test_category.directory }} -m "${{ inputs.pytest_marker }} and ${{ matrix.test_category.marker }}"
