# This file defines a module for building and starting Pathways containers for unit tests.

name: Start pathways containers

on:
  workflow_call:
    inputs:
      device_type:
        required: true
        type: string
      device_name:
        required: true
        type: string

jobs:
  start_pathways:
    name: Start Pathways containers on (${{ inputs.device_name }})
    runs-on: ["self-hosted", "${{ inputs.device_type }}", "${{ inputs.device_name }}"]
    steps:
      - uses: actions/checkout@v4
      - name: Start containers using script
        run: |
          bash docker_build_pathways_containers.sh

