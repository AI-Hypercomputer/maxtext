# This file runs unit tests with Pathways backend.

name: Run Pathways Tests

on:
  workflow_call:
    inputs:
      device_type:
        required: true
        type: string
      device_name:
        required: true
        type: string
      image_type:
        required: false
        type: string
      pytest_marker:
        required: true
        type: string
      is_scheduled_run:
        required: true
        type: string
      xla_python_client_mem_fraction:
        required: true
        type: string
      tf_force_gpu_allow_growth:
        required: true
        type: string
      container_resource_option:
        required: true
        type: string
      cloud_runner:
        required: false
        type: string

jobs:
  run:
    runs-on: ${{ inputs.cloud_runner != '' && inputs.cloud_runner || fromJson(format('["self-hosted", "{0}", "{1}"]', inputs.device_type, inputs.device_name)) }}
    container:
      image: us-docker.pkg.dev/cloud-tpu-v2-images/pathways/server:latest
      env:
        HOST_ADDRESS: resource_manager
        TPU_SKIP_MDS_QUERY: true
    steps:
      - uses: actions/checkout@v4
      - name: Run Server
        run: |
          /usr/pathways/run/cloud_pathways_server_sanitized --server_port=29001 --node_type=resource_manager --instance_count=1 --instance_type=tpuv4:2x2x1, --gcs_scratch_location=gs://cloud-pathways-staging/tmp
