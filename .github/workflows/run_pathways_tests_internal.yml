# This file runs unit tests with Pathways backend.

name: Run Pathways Tests

on:
  workflow_call:
    inputs:
      device_type:
        required: true
        type: string
      device_name:
        required: true
        type: string
      image_type:
        required: false
        type: string
      pytest_marker:
        required: true
        type: string
      is_scheduled_run:
        required: true
        type: string
      xla_python_client_mem_fraction:
        required: true
        type: string
      tf_force_gpu_allow_growth:
        required: true
        type: string
      container_resource_option:
        required: true
        type: string
      cloud_runner:
        required: false
        type: string

jobs:
  run:
    runs-on: ${{ inputs.cloud_runner != '' && inputs.cloud_runner || fromJson(format('["self-hosted", "{0}", "{1}"]', inputs.device_type, inputs.device_name)) }}
    container:
      image: gcr.io/cloud-tpu-multipod-dev/wstcliyu_latest@sha256:9789cb0fcf6496e0987c8228096a62897bfb5d59babbffd27d9e8f2017f4dc0b
      # image: us-docker.pkg.dev/cloud-tpu-v2-images-dev/pathways/maxtext_jax_stable:latest
      env:
        XLA_PYTHON_CLIENT_MEM_FRACTION: ${{ inputs.xla_python_client_mem_fraction }}
        TF_FORCE_GPU_ALLOW_GROWTH: ${{ inputs.tf_force_gpu_allow_growth }}
        TPU_SKIP_MDS_QUERY: ${{ inputs.image_type == 'tpu' && inputs.device_type != 'tpu' && '1' || '' }}
        JAX_PLATFORMS: "proxy"
        JAX_BACKEND_TARGET: "grpc://localhost:29000"
      options: ${{ inputs.container_resource_option }}
    steps:
      - uses: actions/checkout@v4
      - name: Run
        run: |
          python3 -m pip install -e . --no-dependencies &&
          sleep 600 &&
          python3 -m pytest -v /deps/tests/attention_test.py::ChunkedCausalMaskTest::test_full_length_chunk --durations=0
    
    services:
      resource_manager:
        image: us-docker.pkg.dev/cloud-tpu-v2-images/pathways/server:latest
        ports:
          - "29001:29001"
          - "29002:29002"
        options:
          --entrypoint=[/usr/pathways/run/cloud_pathways_server_sanitized, --server_port=29001, --node_type=resource_manager, --instance_count=1, --instance_type=tpuv5e:2x2, --gcs_scratch_location=gs://cloud-pathways-staging/tmp]
        env:
          TPU_SKIP_MDS_QUERY: true

      worker:
        image: us-docker.pkg.dev/cloud-tpu-v2-images/pathways/server:latest
        ports:
          - "29005:29005"
          - "29006:29006"
          - "8471:8471"
          - "8080:8080"
        options:
          --entrypoint=[/usr/pathways/run/cloud_pathways_server_sanitized, --server_port=29005, --resource_manager_address=localhost:29001, --gcs_scratch_location=gs://cloud-pathways-staging/tmp]
          --tpu=4

      proxy:
        image: us-docker.pkg.dev/cloud-tpu-v2-images/pathways/proxy_server:latest
        ports:
          - "29000:29000"
        options:
          --entrypoint=[/usr/pathways/run/cloud_proxy_server_sanitized, --server_port=29000, --resource_manager_address=localhost:29001, --gcs_scratch_location=gs://cloud-pathways-staging/tmp]
