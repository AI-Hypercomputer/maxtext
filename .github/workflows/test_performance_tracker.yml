name: Test Performance Tracker

on:
  workflow_run:
    workflows: ["MaxText Package Tests"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  track-performance:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: test-results
          pattern: test-results-*
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Parse JUnit XML to Benchmark format
        run: |
          python3 tests/utils/parse_junit_to_benchmark.py test-results benchmark-results.json

      - name: Track Test Durations (Main)
        if: github.event.workflow_run.head_branch == 'main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: MaxText Test Execution Times
          tool: 'customSmallerIsBetter'
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false

      - name: Verify Test Durations (PR)
        if: github.event.workflow_run.head_branch != 'main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: MaxText Test Execution Times
          tool: 'customSmallerIsBetter'
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: true
