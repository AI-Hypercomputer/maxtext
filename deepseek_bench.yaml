apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  annotations:
    jobset.sigs.k8s.io/hack: "true"
  labels: {}
  name: mohitkhatwani-dsv3 # Change to your favorite run name (please use your ldap)
  namespace: default
spec:
  coordinator:
    replicatedJob: pathways-head
  failurePolicy:
    maxRestarts: 0
    restartStrategy: Recreate
  network:
    enableDNSHostnames: true
    publishNotReadyAddresses: true
  replicatedJobs:
  # ── Pathways Head (CPU pod): Resource Manager + Proxy Server + vLLM client ──
  - name: pathways-head
    replicas: 1
    template:
      metadata:
        annotations: {}
      spec:
        backoffLimit: 0
        completionMode: Indexed
        completions: 1
        parallelism: 1
        template:
          metadata:
            annotations:
              kueue.x-k8s.io/safe-to-forcefully-delete: "true"
            labels: {}
          spec:
            containers:
            - name: jax-tpu
              image: gcr.io/tpu-prod-env-multipod/mohit-dsv3-build:20260406
              imagePullPolicy: Always
              securityContext:
                privileged: true
              command:
                - bash
                - -c
                - |
                  echo "XPK Start: $(date)"
                  _sigterm() (kill -SIGTERM $! 2>/dev/null)
                  trap _sigterm SIGTERM

                  (
                    pip show jax; 
                    pip show libtpu; 
                    MODEL_IMPL_TYPE=auto NEW_MODEL_DESIGN=True \
                    python3 src/maxtext/integration/tunix/weight_mapping/bench_weight_sync.py \
                    --model_name=deepseek3-671b \
                    --vllm_model_id=deepseek-ai/DeepSeek-V3 \
                    --rand_init=True \
                    --ici_fsdp_parallelism=1 \
                    --ici_tensor_parallelism=128 \
                    --rollout_tensor_parallelism=128 \
                    --run_vllm_only=True
                  ) & PID=$!

                  while kill -0 $PID 2>/dev/null; do
                    sleep 5
                  done
                  wait $PID
                  EXIT_CODE=$?

                  echo "XPK End: $(date)"
                  echo "EXIT_CODE=$EXIT_CODE"
                  exit $EXIT_CODE
              env:
              - name: PATHWAYS_HEAD
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
              - name: JAX_PLATFORMS
                value: proxy
              - name: XCLOUD_ENVIRONMENT
                value: GCP
              - name: JAX_BACKEND_TARGET
                value: grpc://$(PATHWAYS_HEAD):29000
              resources:
                limits:
                  cpu: "24"
                  memory: 100G
              volumeMounts:
              - mountPath: /tmp
                name: shared-tmp
            dnsPolicy: ClusterFirstWithHostNet
            hostNetwork: true
            # ── Pathways Resource Manager (sidecar initContainer) ──
            initContainers:
            - name: pathways-rm
              image: us-docker.pkg.dev/cloud-tpu-v2-images-dev/pathways/gke/wenxindong/unsanitized_server:latest
              imagePullPolicy: Always
              args:
              - --server_port=29001
              - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
              - --node_type=resource_manager
              - --instance_count=1
              - --instance_type=tpu7x:4x4x4
              env:
              - name: REPLICATED_JOB_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.annotations['jobset.sigs.k8s.io/replicatedjob-name']
              - name: JOBSET_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.annotations['jobset.sigs.k8s.io/jobset-name']
              - name: HOST_ADDRESS
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
              - name: TPU_SKIP_MDS_QUERY
                value: "true"
              ports:
              - containerPort: 29001
                protocol: TCP
              - containerPort: 29002
                protocol: TCP
              resources:
                limits:
                  cpu: "8"
                  memory: 32G
              restartPolicy: Always
            # ── Pathways Proxy Server (sidecar initContainer, port 29000) ──
            - name: pathways-proxy
              image: us-docker.pkg.dev/cloud-tpu-v2-images-dev/pathways/gke/wenxindong/unsanitized_proxy_server:latest
              imagePullPolicy: Always
              args:
              - --server_port=29000
              - --resource_manager_address=$(PATHWAYS_HEAD):29001
              - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
              - --sidecar_name=external
              env:
              - name: PATHWAYS_HEAD
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
              ports:
              - containerPort: 29000
                protocol: TCP
              resources:
                limits:
                  cpu: "16"
                  memory: 100G
              restartPolicy: Always
            nodeSelector:
              cloud.google.com/gke-nodepool: cpu-np
            restartPolicy: Never
            terminationGracePeriodSeconds: 300
            volumes:
            - name: shared-tmp
              hostPath:
                path: /tmp
                type: DirectoryOrCreate
  # ── TPU Workers: Pathways Worker + Colocated Python sidecar ──
  - name: worker
    replicas: 1
    template:
      metadata:
        labels:
          kueue.x-k8s.io/queue-name: lq
        annotations:
          cloud.google.com/gke-tpu-slice-topology: 4x4x4 # Use your favorite 4m x 4n x 4k topology
      spec:
        backoffLimit: 2048000
        completionMode: Indexed
        completions: 16 # use num_chips / 4 (see your topology setting above)
        parallelism: 16 # same as above
        template:
          metadata:
            annotations:
              cloud.google.com/gke-tpu-slice-topology: 4x4x4 # same as above
              kueue.k8s.io/podset-required-topology: cloud.google.com/gce-topology-block
              kueue.x-k8s.io/podset-slice-required-topology: cloud.google.com/gke-tpu-partition-4x4x4-id
              kueue.x-k8s.io/podset-slice-size: "16"
              cloud.google.com/skip-tpu-webhook-check: "true"
              kueue.x-k8s.io/safe-to-forcefully-delete: "true"
            labels: {}
          spec:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                  - matchExpressions:
                    - key: cloud.google.com/gke-tpu-partition-4x4x4-state
                      operator: In
                      values:
                      - HEALTHY
                      - DEGRADED
            tolerations:
            - key: "google.com/tpu"
              operator: "Equal"
              value: "present"
              effect: "NoSchedule"
            nodeSelector:
              cloud.google.com/gke-tpu-accelerator: tpu7x
              cloud.google.com/reservation-name: ghostfish-l0727cey97uen
            hostNetwork: true
            dnsPolicy: ClusterFirstWithHostNet
            containers:
            - name: pathways-worker
              image: us-docker.pkg.dev/cloud-tpu-v2-images-dev/pathways/gke/wenxindong/unsanitized_server:latest
              imagePullPolicy: Always
              restartPolicy: OnFailure
              restartPolicyRules:
              - action: RestartAllContainers
                exitCodes:
                  operator: NotIn
                  values: [0]
              args:
              - --server_port=29005
              - --resource_manager_address=$(PATHWAYS_HEAD):29001
              - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
              env:
              - name: LIBTPU_INIT_ARGS
                value: "--xla_tpu_log_allocations_on_oom=true"
              - name: TPU_MIN_LOG_LEVEL
                value: "0"
              - name: TF_CPP_MIN_LOG_LEVEL
                value: "0"
              - name: XCLOUD_ENVIRONMENT
                value: GCP
              - name: MEGASCALE_GRPC_ENABLE_XOR_TRACER
                value: "false"
              - name: MEGASCALE_NUM_SLICES
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['jobset.sigs.k8s.io/replicatedjob-replicas']
              - name: JOBSET_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.annotations['jobset.sigs.k8s.io/jobset-name']
              - name: REPLICATED_JOB_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.annotations['jobset.sigs.k8s.io/replicatedjob-name']
              - name: MEGASCALE_SLICE_ID
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['jobset.sigs.k8s.io/job-index']
              - name: PATHWAYS_HEAD
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
              - name: MEGASCALE_COORDINATOR_ADDRESS
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
              ports:
              - containerPort: 29005
                protocol: TCP
              - containerPort: 29006
                protocol: TCP
              - containerPort: 8471
                protocol: TCP
              - containerPort: 8080
                protocol: TCP
              resources:
                limits:
                  google.com/tpu: "4"
                requests:
                  google.com/tpu: "4"
              volumeMounts:
              - mountPath: /tmp
                name: shared-tmp
            initContainers:
            - name: colocated-python-sidecar
              image: us-east5-docker.pkg.dev/cloud-tpu-inference-test/wenxindong/colocated_python:latest
              imagePullPolicy: Always
              env:
              - name: GRPC_SERVER_ADDRESS
                value: "'0.0.0.0:50051'"
              ports:
              - containerPort: 50051
                protocol: TCP
              resources: {}
              restartPolicy: Always
              volumeMounts:
              - mountPath: /tmp
                name: shared-tmp
            restartPolicy: OnFailure
            terminationGracePeriodSeconds: 300
            volumes:
            - name: shared-tmp
              hostPath:
                path: /tmp
                type: DirectoryOrCreate
  startupPolicy:
    startupPolicyOrder: AnyOrder
  successPolicy:
    operator: All
    targetReplicatedJobs:
    - pathways-head
