# Soft Distillation Configuration

# Inherit MaxText defaults
base_config: "base.yml"

# --- Student Specifics ---
# These are passed as kwargs to the Student config initialization
student_overrides:
  model_name: "llama3.1-8b"
  num_query_heads: 16
  head_dim: 256


# --- Teacher Specifics ---
# These are passed as kwargs to the Teacher config initialization
teacher_overrides:
  model_name: "llama3.1-8b"
  # num_query_heads: 32
  # head_dim: 128


# --- Distillation Loss ---
distill_alpha: 0.5
distill_temperature: 1.0

# --- Dataset & Tokenizer ---
hf_path: "OptimalScale/ClimbMix"
dataset_type: "hf"
tokenizer_path: "meta-llama/Llama-3.1-8B"

# dataset_path: "gs://max-datasets-rogue
# tokenizer_path: "src/MaxText/assets//tokenizer_llama3.tiktoken"
# tokenizer_type: "tiktoken"

max_target_length: 2048

# --- Training Loop ---
steps: 19868
checkpoint_period: 2000
log_period: 10
save_checkpoint_on_completion: True

# --- Batch Size Strategy ---
# Global Batch Size = per_device_batch_size * num_devices * gradient_accumulation_steps
per_device_batch_size: 4
gradient_accumulation_steps: 8

# --- Learning Rate Schedule ---
learning_rate: 2.0e-4 
learning_rate_schedule_steps: 19868
warmup_steps_fraction: 0.003
cosine_learning_rate_final_fraction: 0.0045