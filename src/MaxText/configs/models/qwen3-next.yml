# Qwen3-Next small model configuration for Maxtext
# This defines a small 4-layer model with a hybrid of full and linear attention.

# Qwen3-Next small model configuration for Maxtext
# This defines a small 4-layer model with a hybrid of full and linear attention.

base_emb_dim: 2048
base_num_query_heads: 16
base_num_kv_heads: 4
base_mlp_dim: 5632
base_num_decoder_layers: 4
head_dim: 128
normalization_layer_epsilon: 1.e-6
vocab_size: 151936 # Qwen-2 vocab size

# Decoder block type
decoder_block: "qwen3_next"

# Qwen3-Next specific parameters
# Defines the attention type for each of the 4 layers.
layer_types: ["full_attention", "linear_attention", "full_attention", "linear_attention"] 

# Parameters for the Gated Delta Rule (linear_attention) layers
linear_num_value_heads: 16
linear_num_key_heads: 4
linear_key_head_dim: 64
linear_value_head_dim: 64
linear_conv_kernel_dim: 4

# MoE settings (set num_experts > 1 to enable)
num_experts: 1
decoder_sparse_step: 1