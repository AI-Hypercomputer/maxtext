# Soft Distillation Configuration

# Inherit MaxText defaults
base_config: "base.yml"

# --- Student Specifics ---
# These are passed as kwargs to the Student config initialization
student_overrides:
  model_name: "deepseek2-16b"
  num_experts: 16
  shared_experts: 2
  trainable_parameters_mask: ['.*moe_layers.*']
  # Ensure other parameters match 16B Lite
  base_emb_dim: 2048
  base_num_query_heads: 16
  base_num_kv_heads: 16
  base_mlp_dim: 16384
  base_moe_mlp_dim: 4864
  base_num_decoder_layers: 28
  first_num_dense_layers: 14

# --- Teacher Specifics ---
teacher_overrides:
  model_name: "deepseek2-16b"
  num_experts: 32
  shared_experts: 1
  load_parameters_path: "gs://yujiedeng-maxtext-dev/distillation/converted-from-hf-ds-v2-16b-fixed/0/items"

# --- Distillation Loss ---
distill_alpha: 0.5
distill_temperature: 1.0

# --- Dataset & Tokenizer ---
hf_train_files: "gs://maxtext-dataset/hf/climbmix/*.parquet"
hf_path: "parquet"
dataset_type: "hf"


tokenizer_path: "deepseek-ai/DeepSeek-V2-Lite"
tokenizer_type: "huggingface"

max_target_length: 2048

# --- Training Loop ---
steps: 200000
checkpoint_period: 2000
log_period: 10
save_checkpoint_on_completion: True

# --- Batch Size Strategy ---
# Global Batch Size = per_device_batch_size * num_devices * gradient_accumulation_steps
per_device_batch_size: 8
gradient_accumulation_steps: 2

# --- Learning Rate Schedule ---
learning_rate: 2.0e-4
learning_rate_schedule_steps: 200000
warmup_steps_fraction: 0.1
learning_rate_final_fraction: 0.1