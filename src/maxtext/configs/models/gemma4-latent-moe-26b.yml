# Model config for Gemma4-26b with latent MoE (a.k.a. inverted MoE).
#
# Differences vs gemma4-26b:
#   - decoder_block: gemma4_latent_moe
#   - attention output projects to a smaller latent dim (attention_output_dim = 1024)
#   - MoE block runs at that latent dim (moe_expert_input_dim = 1024)
#   - per-layer up-projection from latent dim back to emb_dim before the residual
#   - shared/routed expert intermediates sized to land close to base on both
#     total (~25.2B) and active (~3.82B) params, preserving the base 3:1
#     shared/routed intermediate ratio. All dims are multiples of 256:
#       routed: base 2816*704 = 5.95M; latent 1024*2048 = 6.29M  (+6%)
#       shared: base 2816*2112 = 17.85M; latent 1024*6144 = 18.87M (+6%)
#     Result: active ~3.76B (−1.6% vs base), total ~26.4B (+4.6% vs base).

base_num_decoder_layers: 30
base_emb_dim: 2816
base_num_query_heads: 16
base_num_kv_heads: 8
base_mlp_dim: 6144
base_moe_mlp_dim: 2048
mlp_activations: ["gelu","linear"]
head_dim: 256
global_head_dim: 512
global_num_kv_heads: 2
vocab_size: 262144
decoder_block: "gemma4_latent_moe"
normalization_layer_epsilon: 1e-6
logits_via_embedding: True
sliding_window_size: 1024
use_post_attn_norm: true
use_post_ffw_norm: true
share_kv_projections: true
local_rope_max_timescale: 10000
global_rope_max_timescale: 1000000
rope_max_timescale: 1000000
global_rope_proportion: 0.25
local_rope_proportion: 1.0
v_norm_with_scale: false
final_logits_soft_cap: 30.0

# Latent MoE configuration: attention output and MoE input both at the
# compressed latent dim. Must satisfy attention_output_dim == moe_expert_input_dim.
attention_output_dim: 1024
moe_expert_input_dim: 1024

# MoE configuration
num_experts: 128
num_experts_per_tok: 8
shared_experts: 1
norm_topk_prob: true
load_balance_loss_weight: 0.001
