# Tiny DeepSeek V3 with batchsplit-style sharding/scheduling — for ablation of
# numerical equivalence between use_batch_split_schedule={False,True} on the
# same architecture, seed, and data. Mirrors deepseek3-671b-batchsplit.yml's
# mesh + axis rules but on tiny dims.

base_emb_dim: 64
base_num_query_heads: 4
base_num_kv_heads: 4
base_mlp_dim: 64
base_moe_mlp_dim: 64
base_num_decoder_layers: 61
first_num_dense_layers: 3
mlp_activations: ["silu","linear"]
vocab_size: 129280
enable_dropout: False
logits_via_embedding: False
normalization_layer_epsilon: 1.0e-6
num_experts: 16
num_experts_per_tok: 8
shared_experts: 1
routed_scaling_factor: 2.5
routed_score_func: "sigmoid"
routed_bias: True
decoder_block: "deepseek"
# MLA
attention_type: "mla"
q_lora_rank: 32
kv_lora_rank: 16
qk_nope_head_dim: 128
qk_rope_head_dim: 64
v_head_dim: 128
mscale: 1.0
# RoPE
rope_type: "yarn"
rope_max_timescale: 10_000 # DeepSeek uses  "rope_theta": 10000
max_position_embeddings: 163840
original_max_position_embeddings: 4096
rope_factor: 40
beta_fast: 32

use_batch_split_schedule: True
shard_mode: "explicit"
remove_size_one_mesh_axis_from_type: False
override_logical_axis_rules: True
mesh_axes: ['data', 'fsdp', 'expert', 'context']
data_sharding: [['data', 'fsdp', 'expert', 'context']]
logical_axis_rules: [
    ['activation_batch', ['data', 'fsdp', 'expert', 'context']],
    ['activation_batch_attn', ['data', 'fsdp', 'expert', 'context']],
    ['activation_batch_moe', ['data', 'fsdp', 'expert', 'context']],
    ['activation_embed_and_logits_batch', ['data', 'fsdp', 'expert', 'context']],
    ['activation_kv_batch', ['data', 'fsdp', 'expert', 'context']],
    ['activation_norm_length', []],
    ['activation_norm_length_moe', []],
    ['activation_heads', []],
    ['embed', ['fsdp']],
    ['embed_moe', ['fsdp']],
    ['embed_vocab', ['fsdp']],
    ['embed_no_exp', ['fsdp']],
    ['embed_no_exp_moe', ['fsdp']],
    ['q_lora', ['fsdp']],
    ['kv_lora', ['fsdp']],
    ['q_lora_up_proj', []],
    ['kv_lora_up_proj', []],
    ['q_heads', []],
    ['kv_heads', []],
    ['heads', []],
    ['mlp', []],
    ['expert_only', ['expert']],
]
