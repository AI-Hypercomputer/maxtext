# Tiny version of DeepSeek-V4 (4 Layers) for local sharding and compilation checks.

base_config: base.yml
model_name: deepseek_v4-tiny

base_emb_dim: 128
base_num_query_heads: 16
base_num_kv_heads: 1
head_dim: 32
base_mlp_dim: 128
base_moe_mlp_dim: 128
base_num_decoder_layers: 6
first_num_dense_layers: 0
mlp_activations: ["silu"]
vocab_size: 129280
tokenizer_type: "huggingface"
tokenizer_path: "deepseek-ai/DeepSeek-V3"
enable_dropout: False
logits_via_embedding: False
normalization_layer_epsilon: 1.0e-6
num_experts: 8
num_experts_per_tok: 4
shared_experts: 1
routed_scaling_factor: 1.5
routed_score_func: "sqrtsoftplus"
routed_bias: True
norm_topk_prob: True
decoder_block: "deepseek_v4"
pure_nnx_decoder: True
enable_nnx: True

# Manifold-Constrained Hyper-Connection configurations
mhc_expansion_rate: 4
sinkhorn_iterations: 20
compress_rope_theta: 160000.0
index_head_dim: 32
index_n_heads: 16
index_topk: 64
o_groups: 2
o_lora_rank: 64
sliding_window: 32
num_hash_layers: 3
mlp_activations_limit: 10.0
compress_ratios: [0, 4, 128, 4, 128, 0]

# Compressed Attention
q_lora_rank: 64
kv_lora_rank: 32
qk_nope_head_dim: 32
qk_rope_head_dim: 16
v_head_dim: 128
mscale: 1.0

# RoPE
rope_type: "default"
rope_max_timescale: 10_000
max_position_embeddings: 163840
original_max_position_embeddings: 4096
rope_factor: 40
beta_fast: 32
