# model config for GLM-5.1 - 744B (Mixture of Experts)

base_emb_dim: 6144
base_num_query_heads: 64
base_num_kv_heads: 64
base_mlp_dim: 12288
base_moe_mlp_dim: 2048

# -----------------------------------------------------------------------------
# SANITY CHECK / INITIAL ONBOARDING CONFIG:
# We are currently using 4 decoder layers to run training on a single 8-device VM.
# In production / scaled runs, set base_num_decoder_layers to 78.
# -----------------------------------------------------------------------------
base_num_decoder_layers: 4
# Original full layer count:
# base_num_decoder_layers: 78

first_num_dense_layers: 3
mlp_activations: ["silu","linear"]
vocab_size: 154880
enable_dropout: false
logits_via_embedding: false
normalization_layer_epsilon: 1.0e-5
num_experts: 256
num_experts_per_tok: 8
shared_experts: 1
routed_scaling_factor: 2.5
routed_score_func: "sigmoid"
routed_bias: true
decoder_block: "deepseek"

# Multi-head Latent Attention (MLA)
attention_type: "mla"
attention: "dot_product"
q_lora_rank: 2048
kv_lora_rank: 512
qk_nope_head_dim: 192
qk_rope_head_dim: 64
v_head_dim: 256

# RoPE
mscale: 1.0
rope_type: "default"
rope_max_timescale: 1000000 # "rope_theta": 1000000
max_position_embeddings: 202752
rope_interleave: true

# Indexer for Dynamic Sparse Attention (DSA)
use_indexer: true
indexer_n_heads: 32
indexer_head_dim: 128
indexer_topk: 2048
