# DeepSeek-V4-Flash Model Configuration
# Mapped 100% precisely line-by-line from: scratch_transformers/config.json

base_config: "base.yml"

model_name: "default"  # Override model name target
vocab_size: 129280
decoder_block: "deepseek"

# Global parameter dimensions
base_emb_dim: 4096
base_num_decoder_layers: 43
base_num_query_heads: 64
base_num_kv_heads: 1
head_dim: 512

# Decoupled attention latent projections
q_lora_rank: 1024
kv_lora_rank: 512
qk_nope_head_dim: 128
qk_rope_head_dim: 64
v_head_dim: 128

# Dual-theta RoPE timescales
rope_min_timescale: 1
rope_max_timescale: 10000.0
compress_rope_max_timescale: 160000.0

# Local Sliding Window size
sliding_window_size: 128

# Unified Token Compressor settings
# 43 layers mapping: HCA (128), CSA (4), or sliding MHA (0)
compress_ratios: [0, 0, 4, 128, 4, 128, 4, 128, 4, 128, 4, 128, 4, 128, 4, 128, 4, 128, 4, 128, 4, 128, 4, 128, 4, 128, 4, 128, 4, 128, 4, 128, 4, 128, 4, 128, 4, 128, 4, 128, 4, 128, 4, 0]
compressed_dim: 512

# Decoupled Sparse Attention (DSA) Indexer configurations
use_indexer: True
indexer_head_dim: 128
indexer_n_heads: 64
indexer_topk: 512

# Grouped Output Projection settings
o_groups: 8
o_lora_rank: 1024

# Manifold-Constrained Hyper-Connections (mHC)
mhc_expansion_rate: 4
sinkhorn_iterations: 20
normalization_layer_epsilon: 1e-06

# MoE experts & Hash-MoE configurations
num_experts: 1
shared_experts: 1
base_moe_mlp_dim: 2048
base_mlp_dim: 2048
num_experts_per_tok: 1
# TODO: Support 'sqrtsoftplus' routing scoring function once peer integrates it!
routed_scaling_factor: 1.5
norm_topk_prob: True
# TODO: Add num_hash_layers: 3 once peer is ready!
mlp_activations_limit: 10.0
