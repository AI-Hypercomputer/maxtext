# model config for DeepSeek-OCR-2 (1.2B)
# This is a MoE VLM.

# Language Model (DeepSeek-V2-Lite-like but smaller)
base_emb_dim: 1280
base_num_query_heads: 10
base_num_kv_heads: 10
base_mlp_dim: 6848  # dense MLP intermediate dim (layer 0)
base_moe_mlp_dim: 896 # MoE MLP intermediate dim (layers 1-11)
base_num_decoder_layers: 12
first_num_dense_layers: 1
mlp_activations: ["silu","linear"]
vocab_size: 129280
enable_dropout: false
logits_via_embedding: false
normalization_layer_epsilon: 1.0e-6

# MoE
num_experts: 64
num_experts_per_tok: 6
shared_experts: 2
routed_scaling_factor: 1.0
routed_score_func: "softmax"
routed_bias: false
decoder_block: "deepseek"
use_mla: false

# Attention / RoPE
attention_type: "global"
rope_type: "default" # standard RoPE
rope_max_timescale: 10000
max_position_embeddings: 4096

# Multimodal
# use_multimodal: true
image_placeholder: <image>
# Vision Encoder (SAM ViT-B)
image_size_for_vit: 1024
patch_size_for_vit: 16
hidden_size_for_vit: 768
num_attention_heads_for_vit: 12
num_hidden_layers_for_vit: 12

# Vision Connector (Qwen2Decoder2Encoder)
vision_connector_num_layers: 24
vision_connector_emb_dim: 896
vision_connector_num_query_heads: 14
vision_connector_num_kv_heads: 2
vision_connector_mlp_dim: 4864
