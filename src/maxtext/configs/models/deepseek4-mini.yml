# Mini Model config used for testing

base_emb_dim: 1024
base_num_query_heads: 16
base_num_kv_heads: 1
base_num_decoder_layers: 11
base_mlp_dim: 512
base_moe_mlp_dim: 512
vocab_size: 129280
head_dim: 64

# --- Standard Defaults ---
enable_dropout: false
logits_via_embedding: false
normalization_layer_epsilon: 1.0e-6

# --- V4 Specific Architectural Keys ---
decoder_block: "deepseek4"
mhc_expansion_rate: 4
first_num_hash_layers: 3
indexer_head_dim: 32
indexer_n_heads: 16
indexer_topk: 32

# Note: Layers (0, 1, 2) are prefix layers as `first_num_hash_layers=3`.
# Reduced to exactly 11 layers: 3 prefix [0,0,4] + 8 scanned layers alternating 128 (HCA) and 4 (CSA).
compress_ratios: [0, 0, 4, 128, 4, 128, 4, 128, 4, 128, 4]

# --- MoE configuration ---
mlp_activations: ["silu", "linear"]
num_experts: 32
num_experts_per_tok: 4
mlp_activations_limit: 10
shared_experts: 1
routed_score_func: "sqrtsoftplus"

# --- Attention configuration ---
attention_type: 'compressed'
q_lora_rank: 256
o_groups: 2
o_lora_rank: 256
sliding_window_size: 128

# --- RoPE ---
rope_type: "default"
rope_max_timescale: 10000                  # Main RoPE theta
compressed_rope_max_timescale: 160000      # Compressed RoPE theta
max_position_embeddings: 32768             # Scaled down from 1M to 32K for a mini model