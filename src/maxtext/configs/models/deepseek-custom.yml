# Small model config for testing (derived from DeepSeek V3.2 - 671B)
# Included modules: DeepSeek Sparse Attention, Engram, mHC

# Example command:
# python3 -m maxtext.trainers.pre_train.train src/maxtext/configs/base.yml base_output_directory=${BASE_OUTPUT_PATH} run_name=demo model_name=deepseek-custom scan_layers=True attention=flash use_tokamax_splash=True enable_checkpointing=false async_checkpointing=false dataset_type=synthetic steps=5 per_device_batch_size=4 max_target_length=1024 dtype=bfloat16 weight_dtype=bfloat16 tokenizer_type=huggingface tokenizer_path=deepseek-ai/DeepSeek-V3.2 hf_access_token=${HF_TOKEN}

base_emb_dim: 1024             # Reduced from 7168
base_num_query_heads: 16       # Reduced from 128
base_num_kv_heads: 16          # Reduced from 128
base_mlp_dim: 2048             # Reduced from 18432
base_moe_mlp_dim: 512          # Reduced from 2048
base_num_decoder_layers: 6     # Reduced from 61
first_num_dense_layers: 1      # Reduced from 3
mlp_activations: ["silu","linear"]
vocab_size: 129280
enable_dropout: False
logits_via_embedding: False
normalization_layer_epsilon: 1.0e-6
num_experts: 16                # Reduced from 256
num_experts_per_tok: 2         # Reduced from 8
shared_experts: 1
routed_scaling_factor: 2.5
routed_score_func: "sigmoid"
routed_bias: True
decoder_block: "deepseek"
# MLA
attention_type: "mla"
q_lora_rank: 384               # Reduced from 1536
kv_lora_rank: 128              # Reduced from 512
qk_nope_head_dim: 32           # Reduced from 128
qk_rope_head_dim: 16           # Reduced from 64
v_head_dim: 128
# RoPE
mscale: 1.0
rope_type: "yarn"
rope_max_timescale: 10_000
max_position_embeddings: 4096  # Reduced for local testing
original_max_position_embeddings: 4096
rope_factor: 1
beta_fast: 32
rope_interleave: True
rope_truncate: True
rope_attention_scaling: False
# Indexer for DeepSeek Sparse Attention
use_indexer: True
indexer_n_heads: 16              # Reduced from 64
indexer_head_dim: 64             # Reduced from 128
indexer_topk: 256                # Reduced from 2048
# Hyper-connections: mHC enabled
mhc_expansion_rate: 4
sinkhorn_iterations: 20
# Engram
engram_layers: [1, 4]
engram_num_heads: 8
engram_head_dim: 512
engram_vocab_bases: [226240, 226240]
engram_max_ngram_size: 3
engram_kernel_size: 4
engram_seed: 0
