apiVersion: batch/v1
kind: Job
metadata:
  name: data-prep-glaive
spec:
  backoffLimit: 1
  template:
    spec:
      nodeSelector:
        cloud.google.com/gke-nodepool: cpu-pathways-np
      restartPolicy: Never
      containers:
      - name: data-prep
        image: IMAGE_PLACEHOLDER
        resources:
          requests:
            cpu: "16"
            memory: "64Gi"
          limits:
            cpu: "32"
            memory: "96Gi"
        command:
        - python3
        - /scripts/prepare_data.py
        - --dataset=HF_DATASET_PLACEHOLDER
        - --output=gs://BUCKET_PLACEHOLDER/data/glaive-fc-v2
        - --num-shards=NUM_SHARDS_PLACEHOLDER
        volumeMounts:
        - name: script
          mountPath: /scripts
      volumes:
      - name: script
        configMap:
          name: data-prep-script
