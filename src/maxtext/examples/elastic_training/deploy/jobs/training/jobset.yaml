apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  name: pw-elastic
  labels:
    app: pw-elastic
spec:
  coordinator:
    replicatedJob: pathways-head
  failurePolicy:
    maxRestarts: 20
    restartStrategy: Recreate
  network:
    enableDNSHostnames: true
    publishNotReadyAddresses: true
  startupPolicy:
    startupPolicyOrder: InOrder
  successPolicy:
    operator: All
    targetReplicatedJobs:
      - pathways-head
  replicatedJobs:
    - name: pathways-head
      replicas: 1
      template:
        metadata:
          annotations:
            alpha.jobset.sigs.k8s.io/exclusive-topology: kubernetes.io/hostname
        spec:
          backoffLimit: 0
          completionMode: Indexed
          completions: 1
          parallelism: 1
          template:
            metadata:
              labels:
                app: pw-elastic
              annotations:
                alpha.jobset.sigs.k8s.io/exclusive-topology: kubernetes.io/hostname
            spec:
              hostNetwork: true
              dnsPolicy: ClusterFirstWithHostNet
              restartPolicy: OnFailure
              nodeSelector:
                cloud.google.com/gke-nodepool: cpu-pathways-np
              tolerations:
                - key: node.kubernetes.io/memory-pressure
                  operator: Exists
                  effect: NoSchedule
                - key: node.kubernetes.io/disk-pressure
                  operator: Exists
                  effect: NoSchedule
              initContainers:
                - name: fetch-tokenizer
                  image: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
                  command:
                    - bash
                    - -c
                    - |
                      set -e
                      echo "=== Downloading tokenizer from GCS ==="
                      gcloud storage cp -r "gs://BUCKET_PLACEHOLDER/tokenizer/qwen3-4b/*" /tokenizer/
                      echo "=== Tokenizer ready ==="
                      ls -la /tokenizer/
                  volumeMounts:
                    - name: tokenizer
                      mountPath: /tokenizer
                - name: pathways-rm
                  image: us-docker.pkg.dev/cloud-tpu-v2-images/pathways/server:latest
                  imagePullPolicy: Always
                  restartPolicy: Always
                  args:
                    - --server_port=29001
                    - --gcs_scratch_location=gs://BUCKET_PLACEHOLDER/pathways
                    - --node_type=resource_manager
                    # Slice count (3): keep in sync with --num_elastic_slices and worker replicas.
                    - --instance_count=3
                    - --instance_type=tpuv5e:4x4
                  env:
                    - name: REPLICATED_JOB_NAME
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.annotations['jobset.sigs.k8s.io/replicatedjob-name']
                    - name: JOBSET_NAME
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.annotations['jobset.sigs.k8s.io/jobset-name']
                    - name: HOST_ADDRESS
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
                    - name: TPU_SKIP_MDS_QUERY
                      value: "true"
                  ports:
                    - containerPort: 29001
                    - containerPort: 29002
                  resources:
                    limits:
                      cpu: "8"
                      memory: 32G
                - name: pathways-proxy
                  image: us-docker.pkg.dev/cloud-tpu-v2-images/pathways/proxy_server:latest
                  imagePullPolicy: Always
                  restartPolicy: Always
                  args:
                    - --server_port=29000
                    - --resource_manager_address=$(PATHWAYS_HEAD):29001
                    - --gcs_scratch_location=gs://BUCKET_PLACEHOLDER/pathways
                    # Slice count (3): set = slice count so Pathways tolerates any missing slice.
                    - --num_elastic_slices=3
                  env:
                    - name: PATHWAYS_HEAD
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
                  ports:
                    - containerPort: 29000
                  resources:
                    limits:
                      cpu: "16"
                      memory: 100G
              containers:
                - name: main
                  image: IMAGE_PLACEHOLDER
                  command: ["/bin/bash", "/scripts/train.sh"]
                  env:
                    - name: BUCKET_NAME
                      value: BUCKET_PLACEHOLDER
                    - name: RUN_NAME
                      value: RUN_NAME_PLACEHOLDER
                    - name: DATASET
                      value: DATASET_PLACEHOLDER
                    - name: DEBUGGING
                      value: "DEBUGGING_PLACEHOLDER"
                    - name: HF_TOKEN
                      valueFrom:
                        secretKeyRef:
                          name: hf-token
                          key: token
                    - name: PATHWAYS_HEAD
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
                    - name: JAX_PLATFORMS
                      value: proxy
                    - name: XCLOUD_ENVIRONMENT
                      value: GCP
                    - name: JAX_BACKEND_TARGET
                      value: grpc://$(PATHWAYS_HEAD):29000
                  volumeMounts:
                    - name: train-script
                      mountPath: /scripts
                    - name: tokenizer
                      mountPath: /tokenizer
                      readOnly: true
              volumes:
                - name: train-script
                  configMap:
                    name: train-script
                    defaultMode: 0755
                - name: tokenizer
                  emptyDir: {}
    - name: worker
      # Slice count (3): one worker Job per TPU slice; matches the head pod flags above.
      replicas: 3
      template:
        spec:
          backoffLimit: 20
          completionMode: Indexed
          completions: 4
          parallelism: 4
          template:
            metadata:
              labels:
                app: pw-elastic
              annotations:
                alpha.jobset.sigs.k8s.io/exclusive-topology: cloud.google.com/gke-nodepool
            spec:
              hostNetwork: true
              dnsPolicy: ClusterFirstWithHostNet
              restartPolicy: OnFailure
              nodeSelector:
                cloud.google.com/gke-tpu-accelerator: tpu-v5-lite-podslice
                cloud.google.com/gke-tpu-topology: 4x4
              containers:
                - name: pathways-worker
                  image: us-docker.pkg.dev/cloud-tpu-v2-images/pathways/server:latest
                  imagePullPolicy: Always
                  args:
                    - --server_port=29005
                    - --resource_manager_address=$(PATHWAYS_HEAD):29001
                    - --gcs_scratch_location=gs://BUCKET_PLACEHOLDER/pathways
                  env:
                    - name: TPU_MIN_LOG_LEVEL
                      value: "0"
                    - name: TF_CPP_MIN_LOG_LEVEL
                      value: "0"
                    - name: XCLOUD_ENVIRONMENT
                      value: GCP
                    - name: MEGASCALE_GRPC_ENABLE_XOR_TRACER
                      value: "false"
                    - name: MEGASCALE_NUM_SLICES
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.labels['jobset.sigs.k8s.io/replicatedjob-replicas']
                    - name: JOBSET_NAME
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.annotations['jobset.sigs.k8s.io/jobset-name']
                    - name: REPLICATED_JOB_NAME
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.annotations['jobset.sigs.k8s.io/replicatedjob-name']
                    - name: MEGASCALE_SLICE_ID
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.labels['jobset.sigs.k8s.io/job-index']
                    - name: PATHWAYS_HEAD
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
                    - name: MEGASCALE_COORDINATOR_ADDRESS
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
                  ports:
                    - containerPort: 29005
                    - containerPort: 29006
                    - containerPort: 8471
                    - containerPort: 8080
                  resources:
                    limits:
                      google.com/tpu: "4"
                  volumeMounts:
                    - name: shared-tmp
                      mountPath: /tmp
              volumes:
                - name: shared-tmp
                  hostPath:
                    path: /tmp
                    type: DirectoryOrCreate
