
#### HOST NETWORK
services:

  resource_manager:
    image: us-docker.pkg.dev/cloud-tpu-v2-images/pathways/server:latest
    network_mode: host
    ports:
      - "29001:29001"
      - "29002:29002"
    command:
      - --server_port=29001
      - --node_type=resource_manager
      - --instance_count=1
      - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
      - --instance_type=tpuv4:2x2x1
    environment:
      - HOST_ADDRESS=localhost
      - TPU_SKIP_MDS_QUERY=true


  worker:
    image: us-docker.pkg.dev/cloud-tpu-v2-images/pathways/server:latest
    network_mode: host
    ports:
      - "29005:29005"
      - "29006:29006"
      - "8471:8471"
      - "8080:8080"
    command:
      - --alsologtostderr
      - --server_port=29005
      - --resource_manager_address=localhost:29001
      - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
    environment:
      - TPU_WORKER_ID=0
      - TPU_WORKER_HOSTNAME=localhost
      - MEGASCALE_NUM_SLICES=1
      - MEGASCALE_SLICE_ID=0
      - MEGASCALE_COORDINATOR_ADDRESS=localhost
    privileged: true


  proxy:
    image: us-docker.pkg.dev/cloud-tpu-v2-images/pathways/proxy_server:latest
    network_mode: host
    ports:
      - "29000:29000"
    command:
      - --server_port=29000
      - --resource_manager_address=localhost:29001
      - --gcs_scratch_location=gs://cloud-pathways-staging/tmp


  maxtext:
    image: us-docker.pkg.dev/cloud-tpu-v2-images-dev/pathways/maxtext_jax_stable:latest
    network_mode: host
    privileged: true
    volumes: 
      - ../:/deps
    environment:
      - JAX_PLATFORMS=proxy
      - JAX_BACKEND_TARGET=grpc://localhost:29000
    entrypoint: ["bash", "-c"]
    command:
      - "cd MaxText ; python3 -m pytest -s tests/train_tests.py -m tpu_only"
      # - "cd MaxText ; python3 -m pytest -m tpu_only tests -s"

