apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  labels:
    kueue.x-k8s.io/queue-name: multislice-queue
    xpk.google.com/workload: mohit-rl-qwen3-8543
  name: mohit-rl-qwen3-8543
spec:
  coordinator:
    replicatedJob: pathways-head
  failurePolicy:
    restartStrategy: Recreate
  network:
    enableDNSHostnames: true
    publishNotReadyAddresses: true
  replicatedJobs:
  - name: worker
    replicas: 1
    template:
      metadata:
        annotations: {}
      spec:
        backoffLimit: 64
        completionMode: Indexed
        completions: 16
        parallelism: 16
        template:
          metadata:
            annotations:
              cloud.google.com/gke-tpu-slice-topology: 4x4x4
              cloud.google.com/skip-tpu-webhook-check: 'true'
            labels:
              xpk.google.com/workload: mohit-rl-qwen3-8543
          spec:
            containers:
            - args:
              - --server_port=29005
              - --resource_manager_address=$(PATHWAYS_HEAD):29001
              - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
              - --temporary_flags_for_debugging=temporary_flag_for_debugging_pipe_unreachable_timeout=30m
              env:
              - name: TPU_MIN_LOG_LEVEL
                value: '0'
              - name: TF_CPP_MIN_LOG_LEVEL
                value: '0'
              - name: XCLOUD_ENVIRONMENT
                value: GCP
              - name: MEGASCALE_GRPC_ENABLE_XOR_TRACER
                value: 'false'
              - name: MEGASCALE_NUM_SLICES
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['jobset.sigs.k8s.io/replicatedjob-replicas']
              - name: JOBSET_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.annotations['jobset.sigs.k8s.io/jobset-name']
              - name: REPLICATED_JOB_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.annotations['jobset.sigs.k8s.io/replicatedjob-name']
              - name: MEGASCALE_SLICE_ID
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['jobset.sigs.k8s.io/job-index']
              - name: PATHWAYS_HEAD
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
              - name: MEGASCALE_COORDINATOR_ADDRESS
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
              image: us-docker.pkg.dev/cloud-tpu-v2-images/pathways/server:20260608-jax_0.10.1
              imagePullPolicy: Always
              name: pathways-worker
              ports:
              - containerPort: 29005
                protocol: TCP
              - containerPort: 29006
                protocol: TCP
              - containerPort: 8471
                protocol: TCP
              - containerPort: 8080
                protocol: TCP
              resources:
                limits:
                  google.com/tpu: '4'
              volumeMounts:
              - mountPath: /tmp
                name: shared-tmp
            dnsPolicy: ClusterFirstWithHostNet
            hostNetwork: true
            nodeSelector:
              cloud.google.com/gke-tpu-accelerator: tpu7x
              cloud.google.com/placement-policy-name: tpu7x-128-4x4x4-ss-placement-policy
            priorityClassName: very-high
            restartPolicy: OnFailure
            terminationGracePeriodSeconds: 30
            tolerations:
            - key: google.com/tpu
              operator: Exists
            volumes:
            - hostPath:
                path: /tmp
                type: DirectoryOrCreate
              name: shared-tmp
  - name: pathways-head
    replicas: 1
    template:
      metadata:
        annotations:
          alpha.jobset.sigs.k8s.io/exclusive-topology: kubernetes.io/hostname
      spec:
        backoffLimit: 0
        completionMode: Indexed
        completions: 1
        parallelism: 1
        template:
          spec:
            containers:
            - command:
              - bash
              - -c
              - "echo XPK Start: $(date);\n_sigterm() (kill -SIGTERM $! 2>/dev/null;);\n\
                trap _sigterm SIGTERM;\n\n(cd /app; python3 scripts/patch_vllm_sampler.py;\
                \ pip install -e /app/pathways-utils --no-deps; pip install -e . --no-deps;\
                \ JAX_RANDOM_WEIGHTS=1 SKIP_JAX_PRECOMPILE=1 NEW_MODEL_DESIGN=1 TPU_MIN_LOG_LEVEL=0\
                \ TF_CPP_MIN_LOG_LEVEL=0 TPU_STDERR_LOG_LEVEL=0 JAX_PLATFORMS=proxy,cpu\
                \ NUM_PRECOMPILE_WORKERS=1 JAX_BACKEND_TARGET=grpc://127.0.0.1:29000\
                \ ENABLE_PATHWAYS_PERSISTENCE=1 PYTHONPATH=/app/src python3 -m maxtext.trainers.post_train.rl.train_rl\
                \ model_name=qwen3-0.6b tokenizer_path=Qwen/Qwen3-0.6B run_name=mohit-rl-qwen3-8543\
                \ checkpoint_storage_use_ocdbt=False async_scheduling=False base_output_directory=gs://runner-maxtext-logs/\
                \ chips_per_vm=8 num_batches=20 num_test_batches=0 rl.num_generations=8\
                \ upload_all_profiler_results=True rl.grpo_beta=0.05 rl.grpo_epsilon=0.2\
                \ gradient_clipping_threshold=1.0 decode_sampling_temperature=0.8\
                \ decode_sampling_top_k=50 decode_sampling_nucleus_p=0.95 dataset_name=nvidia/OpenMathInstruct-2\
                \ hf_train_files=hf://datasets/nvidia/OpenMathInstruct-2/data/train_1M-*.parquet\
                \ train_split=train_1M max_target_length=8198 max_prefill_predict_length=8192\
                \ learning_rate=1e-6 batch_size=480 train_micro_batch_size=8 rollout_micro_batch_size=480\
                \ rollout_data_parallelism=16 rollout_tensor_parallelism=4 enable_dp_attention=false\
                \ hbm_utilization_vllm=0.22 max_num_seqs=4096 max_num_batched_tokens=8454\
                \ scan_layers=True allow_split_physical_axes=True enable_tunix_perf_metrics=True\
                \ checkpoint_period=20 max_num_checkpoints_to_keep=1000 enable_checkpointing=true\
                \ load_parameters_path=gs://mohitkhatwani_multipods/qwen3-0.6b/pathways-compat/0/items\
                \ rollout_vllm_init_with_random_weights=True profiler=xplane skip_first_n_steps_for_profiler=1\
                \ profiler_steps=3) & PID=$!;\nwhile kill -0 $PID 2>/dev/null;\n \
                \   do sleep 5;\ndone;\nwait $PID;\nEXIT_CODE=$?;\n\necho XPK End:\
                \ $(date);\necho EXIT_CODE=$EXIT_CODE;\n\n\nexit $EXIT_CODE\n"
              env:
              - name: PATHWAYS_HEAD
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
              - name: JAX_PLATFORMS
                value: proxy
              - name: XCLOUD_ENVIRONMENT
                value: GCP
              - name: JAX_BACKEND_TARGET
                value: grpc://$(PATHWAYS_HEAD):29000
              image: gcr.io/cloud-tpu-multipod-dev/mohitkhatwani-runner:post-training-2026-06-23
              imagePullPolicy: Always
              name: jax-tpu
              resources:
                limits:
                  cpu: '24'
                  memory: 100G
              securityContext:
                privileged: true
              volumeMounts:
              - mountPath: /tmp
                name: shared-tmp
            dnsPolicy: ClusterFirstWithHostNet
            hostNetwork: true
            initContainers:
            - args:
              - --server_port=29000
              - --resource_manager_address=$(PATHWAYS_HEAD):29001
              - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
              - --xla_tpu_dvfs_p_state=7
              - --xla_tpu_scoped_vmem_limit_kib=65536
              - --xla_tpu_num_sparse_cores_for_gather_offloading=1
              - --xla_tpu_bf16_emission_mode=NATIVE_EMISSION
              - --xla_tpu_enable_sparse_core_reduce_scatter_v2=true
              - --xla_tpu_enable_sparse_core_collective_offload_all_gather=true
              - --xla_tpu_enable_sparse_core_collective_offload_2d_all_gather=true
              - --xla_tpu_use_tc_device_shape_on_sc=True
              - --xla_sc_disable_megacore_partitioning=True
              - --xla_tpu_enable_async_collective_fusion_fuse_all_gather=false
              - --xla_enable_async_all_gather=true
              - --xla_tpu_prefer_async_allgather_to_allreduce=true
              - --xla_tpu_enable_sparse_core_collective_offload_all_reduce=true
              - --xla_tpu_enable_sparse_core_collective_offload_reduce_scatter=true
              - --xla_tpu_enable_sparse_core_collective_offload_3d_all_gather=true
              - --xla_tpu_use_single_sparse_core_for_all_gather_offload=true
              - --xla_tpu_enable_concurrent_sparse_core_offloading=true
              - --xla_tpu_enable_offloading_gather_to_sparsecore=true
              - --xla_tpu_sparse_core_all_gather_latency_multiplier=1
              - --xla_tpu_sparse_core_reduce_scatter_latency_multiplier=3
              - --xla_tpu_enable_sparse_core_collective_aggregator=true
              - --xla_tpu_enable_latency_hiding_layer_scheduler=true
              - --xla_tpu_scheduler_percent_shared_memory_limit=150
              - --xla_tpu_enable_layer_scheduler_for_dependent_collectives=true
              - --xla_tpu_enable_sparse_core_collective_offload_nd_reduce_scatter=true
              - --xla_tpu_pcie_bandwidth_multiplier=0.03
              - --xla_tpu_enable_sparse_core_offload_queuing_in_lhs=true
              - --xla_tpu_enable_multi_compute_overlap_in_layer_scheduler=false
              - --xla_tpu_enable_3d_reduce_scatter_decomposer=false
              env:
              - name: PATHWAYS_HEAD
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
              image: us-docker.pkg.dev/cloud-tpu-v2-images/pathways/proxy_server:20260608-jax_0.10.1
              imagePullPolicy: Always
              name: pathways-proxy
              ports:
              - containerPort: 29000
                protocol: TCP
              resources:
                limits:
                  cpu: '16'
                  memory: 100G
              restartPolicy: Always
            - args:
              - --server_port=29001
              - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
              - --node_type=resource_manager
              - --instance_count=1
              - --instance_type=tpu7x:4x4x4
              env:
              - name: REPLICATED_JOB_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.annotations['jobset.sigs.k8s.io/replicatedjob-name']
              - name: JOBSET_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.annotations['jobset.sigs.k8s.io/jobset-name']
              - name: HOST_ADDRESS
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
              - name: TPU_SKIP_MDS_QUERY
                value: 'true'
              image: us-docker.pkg.dev/cloud-tpu-v2-images/pathways/server:20260608-jax_0.10.1
              imagePullPolicy: Always
              name: pathways-rm
              ports:
              - containerPort: 29001
                protocol: TCP
              - containerPort: 29002
                protocol: TCP
              resources:
                limits:
                  cpu: '8'
                  memory: 32G
              restartPolicy: Always
            nodeSelector:
              cloud.google.com/gke-nodepool: cpu-np
            restartPolicy: Never
            volumes:
            - hostPath:
                path: /tmp
                type: DirectoryOrCreate
              name: shared-tmp
  startupPolicy:
    startupPolicyOrder: InOrder
  successPolicy:
    operator: All
    targetReplicatedJobs:
    - pathways-head
  suspend: false
