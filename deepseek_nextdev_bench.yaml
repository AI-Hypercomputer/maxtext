apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  name: mohit-dsv3
  labels:
    kueue.x-k8s.io/queue-name: multislice-queue  # Name of the LocalQueue
    xpk.google.com/workload: mohit-dsv3
spec:
  coordinator:
    replicatedJob: pathways-head
  network:
    enableDNSHostnames: true
    publishNotReadyAddresses: true
  failurePolicy:
    restartStrategy: Recreate
  replicatedJobs:
  - name: pathways-head
    replicas: 1
    template:
      spec:
        backoffLimit: 0
        completionMode: Indexed
        completions: 1
        parallelism: 1
        template:
          metadata:
            annotations:
              alpha.jobset.sigs.k8s.io/exclusive-topology: kubernetes.io/hostname
          spec:
            hostNetwork: true
            dnsPolicy: ClusterFirstWithHostNet
            nodeSelector:
              cloud.google.com/gke-nodepool: m3-megamem-pool
            initContainers:
              - name: pathways-proxy
                image: us-docker.pkg.dev/cloud-tpu-v2-images-dev/pathways/gke/wenxindong/unsanitized_proxy_server:latest
                imagePullPolicy: Always
                args:
                - --server_port=29000
                - --resource_manager_address=$(PATHWAYS_HEAD):29001
                - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
                env:
                - name: PATHWAYS_HEAD
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
                ports:
                - containerPort: 29000
                  protocol: TCP
                resources:
                  limits:
                    cpu: "24"
                    memory: 950G
                restartPolicy: Always
              - name: pathways-rm
                image: us-docker.pkg.dev/cloud-tpu-v2-images-dev/pathways/gke/wenxindong/unsanitized_server:latest
                imagePullPolicy: Always
                args:
                - --server_port=29001
                - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
                - --node_type=resource_manager
                - --instance_count=1
                - --instance_type=tpu7x:4x4x4
                env:
                - name: REPLICATED_JOB_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['jobset.sigs.k8s.io/replicatedjob-name']
                - name: JOBSET_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['jobset.sigs.k8s.io/jobset-name']
                - name: HOST_ADDRESS
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
                - name: TPU_SKIP_MDS_QUERY
                  value: "true"
                ports:
                - containerPort: 29001
                  protocol: TCP
                - containerPort: 29002
                  protocol: TCP
                resources:
                  limits:
                    cpu: "8"
                    memory: 32G
                restartPolicy: Always
            containers:
              - name: jax-tpu
                image: gcr.io/tpu-prod-env-multipod/mohit-dsv3-vllm:20260408
                imagePullPolicy: Always
                env:
                - name: PATHWAYS_HEAD
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
                - name: MOE_REQUANTIZE_WEIGHT_DTYPE
                  value: "bfloat16"
                - name: VLLM_MLA_DISABLE
                  value: "1"
                - name: JAX_PLATFORMS
                  value: proxy,cpu
                - name: XCLOUD_ENVIRONMENT
                  value: GCP
                - name: JAX_BACKEND_TARGET
                  value: grpc://$(PATHWAYS_HEAD):29000 
                securityContext:
                  privileged: true
                command:
                - bash
                - -c
                - |
                  echo XPK Start: $(date);
                  _sigterm() (kill -SIGTERM $! 2>/dev/null;);
                  trap _sigterm SIGTERM;
                  
                  (pip show jax; pip show jaxlib; pip show libtpu; pip show tpu-inference; pip show vllm; MODEL_IMPL_TYPE=vllm NEW_MODEL_DESIGN=True         python3 src/maxtext/integration/tunix/weight_mapping/bench_weight_sync.py         --model_name=deepseek3-671b         --vllm_model_id=deepseek-ai/DeepSeek-V3         --vllm_checkpoint_path=gs://ranlihao-deepseek/model/r1         --rand_init=True         --ici_fsdp_parallelism=1         --ici_tensor_parallelism=128         --rollout_tensor_parallelism=1         --rollout_expert_parallelism=128         --run_vllm_only=True         --load_format=runai_streamer         --model_loader_extra_config='{"memory_limit":10737418240}') & PID=$!;
                  while kill -0 $PID 2>/dev/null;
                      do sleep 5;
                  done;
                  wait $PID;
                  EXIT_CODE=$?;
                  
                  echo XPK End: $(date);
                  echo EXIT_CODE=$EXIT_CODE;
                  
                  
                  exit $EXIT_CODE
                resources:
                  limits:
                    cpu: "90"
                    memory: 850G

                volumeMounts:
                - mountPath: /tmp
                  name: shared-tmp
                

            restartPolicy: Never
            volumes:
            - hostPath:
                path: /tmp
                type: DirectoryOrCreate
              name: shared-tmp
  - name: worker
    replicas: 1
    template:
      spec:
        backoffLimit: 64
        completionMode: Indexed
        completions: 16
        parallelism: 16
        template:
          metadata:
            labels:
              xpk.google.com/workload: dsv3-12335
            annotations:
              alpha.jobset.sigs.k8s.io/exclusive-topology: cloud.google.com/gke-nodepool
          spec:
            hostNetwork: true
            dnsPolicy: ClusterFirstWithHostNet
            terminationGracePeriodSeconds: 30
            priorityClassName: medium
            nodeSelector:
              cloud.google.com/gke-tpu-accelerator: tpu7x
              cloud.google.com/gke-tpu-topology: 4x4x4
              cloud.google.com/placement-policy-name: tpu7x-128-4x4x4-placement-policy
            containers:
              - name: pathways-worker
                image: us-docker.pkg.dev/cloud-tpu-v2-images-dev/pathways/gke/wenxindong/unsanitized_server:latest
                imagePullPolicy: Always
                args:
                - --server_port=29005
                - --resource_manager_address=$(PATHWAYS_HEAD):29001
                - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
                env:
                - name: TPU_MIN_LOG_LEVEL
                  value: "0"
                - name: TF_CPP_MIN_LOG_LEVEL
                  value: "0"
                - name: XCLOUD_ENVIRONMENT
                  value: GCP
                - name: MEGASCALE_GRPC_ENABLE_XOR_TRACER
                  value: "false"
                - name: MEGASCALE_NUM_SLICES
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.labels['jobset.sigs.k8s.io/replicatedjob-replicas']
                - name: JOBSET_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['jobset.sigs.k8s.io/jobset-name']
                - name: REPLICATED_JOB_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['jobset.sigs.k8s.io/replicatedjob-name']
                - name: MEGASCALE_SLICE_ID
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.labels['jobset.sigs.k8s.io/job-index']
                - name: PATHWAYS_HEAD
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
                - name: MEGASCALE_COORDINATOR_ADDRESS
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
                ports:
                - containerPort: 29005
                  protocol: TCP
                - containerPort: 29006
                  protocol: TCP
                - containerPort: 8471
                  protocol: TCP
                - containerPort: 8080
                  protocol: TCP
                resources:
                  limits:
                    google.com/tpu: "4"
                volumeMounts:
                - mountPath: /tmp
                  name: shared-tmp
            restartPolicy: OnFailure
            volumes:
            - hostPath:
                path: /tmp
                type: DirectoryOrCreate
              name: shared-tmp
  startupPolicy:
    startupPolicyOrder: InOrder
  successPolicy:
    operator: All
    targetReplicatedJobs:
    - pathways-head
  suspend: false

